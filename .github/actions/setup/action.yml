name: Setup
description: Setup Node.js, Bun, and install dependencies

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.2.19

    - name: Install dependencies
      run: bun install --frozen-lockfile
      shell: bash
